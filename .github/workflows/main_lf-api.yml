name: Build and deploy Node.js project to Azure Function App - lf-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Install all & Build'
        shell: pwsh
        run: |
          npm ci
          npm run build

      - name: 'Reinstall production deps only'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force node_modules
          npm ci --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            host.json
            package.json
            package-lock.json
            node_modules/

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_219B3993C71445E19EC301E5A25874B2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1711A4202BE64EC898B40936DDD22BAB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_147982D8B8754A74A9F9112DC92BC66A }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'lf-api'
          slot-name: 'Production'
          package: '.'
          scm-do-build-during-deployment: false